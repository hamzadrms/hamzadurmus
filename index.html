<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamza Durmuş</title>
    <style>
        /* 1. FONT TANIMLAMALARI */
        @font-face {
            font-family: 'SF Pro Display';
            src: url('SFProDisplay-Bold.ttf') format('truetype');
            font-weight: 700;
        }

        @font-face {
            font-family: 'SF Pro Text';
            src: url('SFProText-Regular.ttf') format('truetype');
            font-weight: 400;
        }

        /* 2. DEĞİŞKENLER */
        :root {
            --bg-color: #0b0b0b;
            --card-bg: #161617;
            --text-color: #ffffff;
            --accent-color: #0a84ff;
            --secondary-text: #a1a1a6;
        }

        * {
            -webkit-font-smoothing: antialiased;
            box-sizing: border-box;
        }

        body {
            font-family: 'SF Pro Text', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 3. DÖNEN IŞIK EFEKTİ (BORDER ANIMATION) */
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .glow-wrapper {
            position: relative;
            width: 90%;
            max-width: 480px;
            padding: 3px; /* Işığın kalınlığı */
            border-radius: 40px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Dönen Işık Katmanı */
        .glow-wrapper::before {
            content: "";
            position: absolute;
            width: 150%;
            height: 150%;
            background: conic-gradient(
                from 0deg,
                transparent,
                #0a84ff, /* Mavi */
                #bf00ff, /* Mor */
                transparent,
                transparent
            );
            animation: rotate 4s linear infinite;
        }

        .glow-wrapper:hover {
            transform: scale(1.05);
        }

        /* Ana İçerik Kutusu */
        .container {
            width: 100%;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 38px;
            position: relative;
            z-index: 2;
        }

        h1 {
            font-family: 'SF Pro Display', sans-serif;
            font-weight: 700;
            font-size: 34px;
            letter-spacing: -0.04em;
            margin: 0 0 5px 0;
        }

        .role {
            font-size: 18px;
            color: var(--secondary-text);
            margin-bottom: 30px;
        }

        .section {
            text-align: left;
            margin-bottom: 25px;
            border-top: 0.5px solid rgba(255, 255, 255, 0.1);
            padding-top: 20px;
        }

        h2 {
            font-size: 13px;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-bottom: 12px;
        }

        .cv-title { font-size: 16px; font-weight: 600; margin-bottom: 2px; }
        .cv-desc { font-size: 14px; color: var(--secondary-text); line-height: 1.4; }

        .btn {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #ffffff;
            color: #000000;
            text-decoration: none;
            padding: 18px;
            border-radius: 20px;
            margin-top: 30px;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-3px);
            background: #f0f0f0;
        }

        .btn-main { font-size: 16px; font-weight: 700; }
        .btn-sub { font-size: 11px; opacity: 0.7; margin-top: 4px; }

    </style>
</head>
<body>

<div class="glow-wrapper">
    <div class="container">
        <h1>Hamza Durmuş</h1>
        <div class="role">baya yakışıklıdır kendisi</div>
        
        <div class="section">
            <h2>Eğitim</h2>
            <div class="cv-item">
                <div class="cv-title">Ortaokul (hala okuyorum)</div>
                <div class="cv-desc">15 Temmuz Şehitleri İHO, Bahçelievler, İstanbul</div>
            </div>
        </div>

        <div class="section">
            <h2>Özgeçmiş</h2>
            <div class="cv-item">
                <div class="cv-title">Kendi hakkımda</div>
                <div class="cv-desc">13 yaşındayım ya CV falan daha yok bende</div>
            </div>
        </div>

        <div class="section">
            <h2>İlgi Alanları</h2>
            <div class="cv-desc">ALLAH ATATÜRK FENERBAHÇE</div>
        </div>

        <a href="mailto:hamzadurmuss1@outlook.com" class="btn">
            <span class="btn-main">İletişime Geç</span>
            <span class="btn-sub">güzel kızlar yazsın 😉</span>
        </a>
    </div>
</div>

</body>
</html>
