<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamza Durmuş</title>
    <style>
        /* 1. FONT TANIMLAMALARI */
        @font-face {
            font-family: 'SF Pro Display';
            src: url('SFProDisplay-Bold.ttf') format('truetype');
            font-weight: 700;
        }

        @font-face {
            font-family: 'SF Pro Text';
            src: url('SFProText-Regular.ttf') format('truetype');
            font-weight: 400;
        }

        /* 2. PREMIUM RENK PALETİ (Daha Grimsi Arka Plan) */
        :root {
            --bg-color: #e5e5e7; /* Daha koyu, premium gri tonu */
            --card-bg: #1d1d1f;  /* Koyu Gri/Siyah Kutucuk */
            --text-color: #ffffff;
            --accent-color: #0071e3;
            --secondary-text: #86868b;
            --neon-blue: #0071e3;
            --neon-purple: #bf00ff;
        }

        * {
            -webkit-font-smoothing: antialiased;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'SF Pro Text', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 3. KALIN NEON MAVİ-MOR İP ANİMASYONU */
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .glow-wrapper {
            position: relative;
            width: 90%;
            max-width: 480px;
            padding: 4px; /* İpi kalınlaştırdım (2.5'ten 4'e) */
            border-radius: 44px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(0,0,0,0.1);
        }

        /* Dönen Mavi-Mor Kalın İp */
        .glow-wrapper::before {
            content: "";
            position: absolute;
            width: 160%;
            height: 160%;
            /* Sert geçişli ama çift renkli ip */
            background: conic-gradient(
                from 0deg,
                transparent 0%,
                transparent 40%,
                var(--neon-blue) 43%, /* Mavi başlangıç */
                var(--neon-purple) 57%, /* Mor bitiş */
                transparent 60%,
                transparent 100%
            );
            animation: rotate 3.5s linear infinite;
        }

        /* Neon Parlama Efekti */
        .glow-wrapper::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 44px;
            /* İpin etrafındaki neon sis */
            box-shadow: inset 0 0 15px rgba(191, 0, 255, 0.4), 
                        0 0 30px rgba(0, 113, 227, 0.3);
            pointer-events: none;
            z-index: 1;
        }

        .glow-wrapper:hover {
            transform: scale(1.04);
        }

        /* Ana İçerik Kutusu */
        .container {
            width: 100%;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 40px;
            position: relative;
            z-index: 2;
        }

        /* 4. İÇERİK STİLLERİ */
        h1 {
            font-family: 'SF Pro Display', sans-serif;
            font-weight: 700;
            font-size: 34px;
            letter-spacing: -0.04em;
            margin-bottom: 5px;
            color: #ffffff;
        }

        .role {
            font-size: 18px;
            color: var(--secondary-text);
            margin-bottom: 30px;
        }

        .section {
            text-align: left;
            margin-bottom: 25px;
            border-top: 0.5px solid #323235;
            padding-top: 20px;
        }

        h2 {
            font-size: 13px;
            color: #0071e3;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .cv-title { font-size: 16px; font-weight: 600; margin-bottom: 2px; }
        .cv-desc { font-size: 14px; color: var(--secondary-text); line-height: 1.4; }

        /* 5. BUTON AYARLARI */
        .btn {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #ffffff;
            color: #000000;
            text-decoration: none;
            padding: 16px;
            border-radius: 16px;
            margin-top: 30px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn:hover {
            background: #f5f5f7;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .btn-sub { font-size: 11px; opacity: 0.6; font-weight: 400; margin-top: 2px; }

    </style>
</head>
<body>

<div class="glow-wrapper">
    <div class="container">
        <h1>Hamza Durmuş</h1>
        <div class="role">baya yakışıklıdır kendisi</div>
        
        <div class="section">
            <h2>Eğitim</h2>
            <div class="cv-item">
                <div class="cv-title">Ortaokul (hala okuyorum)</div>
                <div class="cv-desc">15 Temmuz Şehitleri İHO, Bahçelievler, İstanbul</div>
            </div>
        </div>

        <div class="section">
            <h2>Özgeçmiş</h2>
            <div class="cv-item">
                <div class="cv-title">Kendi hakkımda</div>
                <div class="cv-desc">13 yaşındayım ya CV falan daha yok bende</div>
            </div>
        </div>

        <div class="section">
            <h2>İlgi Alanları</h2>
            <div class="cv-desc" style="color: var(--secondary-text);">ALLAH ATATÜRK FENERBAHÇE</div>
        </div>

        <a href="mailto:hamzadurmuss1@outlook.com" class="btn">
            <span>İletişime Geç</span>
            <span class="btn-sub">güzel kızlar yazsın 😉</span>
        </a>
    </div>
</div>

</body>
</html>
