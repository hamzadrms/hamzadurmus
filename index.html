<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamza Durmuş | Sistem Analisti</title>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #1c1c1e;
            --text-color: #ffffff;
            --accent-color: #0a84ff;
            --secondary-text: #8e8e93;
        }

        body {
            font-family: "-apple-system", "BlinkMacSystemFont", "SF Pro Text", "SF Pro Display", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 90%;
            max-width: 450px;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 {
            font-family: "-apple-system", "SF Pro Display", sans-serif;
            font-weight: 600;
            font-size: 32px;
            letter-spacing: -0.022em;
            margin: 0 0 10px 0;
        }

        .subtitle {
            color: var(--secondary-text);
            margin-bottom: 30px;
        }

        .section {
            text-align: left;
            margin-bottom: 20px;
        }

        h2 {
            font-size: 14px;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .skill-tag {
            display: inline-block;
            background: #2c2c2e;
            padding: 5px 12px;
            border-radius: 10px;
            font-size: 14px;
            margin: 4px 2px;
        }

        .btn {
            display: block;
            background: var(--accent-color);
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 15px;
            font-weight: 600;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Hamza Durmuş</h1>
    <p class="subtitle">Sistem Analizi & İnsan Mühendisliği</p>
    
    <div class="section">
        <h2>Beceriler</h2>
        <div class="skill-tag">Arch Linux</div>
        <div class="skill-tag">HP EliteBook 840 G1</div>
        <div class="skill-tag">WPS Office</div>
    </div>

    <div class="section">
        <h2>Projeler</h2>
        <p style="font-size: 14px; color: var(--secondary-text);">
            • Renk Kodlu Pomodoro Sistemi<br>
            • Sosyal Dinamik Analizleri
        </p>
    </div>

    <a href="mailto:hamzadurmuss1@outlook.com" class="btn">İletişime Geç</a>
</div>

</body>
</html>
