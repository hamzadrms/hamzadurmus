<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamza Durmuş</title>
    <style>
        /* 1. FONT TANIMLAMALARI */
        @font-face {
            font-family: 'SF Pro Display';
            src: url('SFProDisplay-Bold.ttf') format('truetype');
            font-weight: 700;
        }

        @font-face {
            font-family: 'SF Pro Text';
            src: url('SFProText-Regular.ttf') format('truetype');
            font-weight: 400;
        }

        /* 2. PREMIUM KOYU TEMA AYARLARI */
        :root {
            --bg-color: #1a1a1c; /* Göz yormayan koyu antrasit */
            --card-bg: #000000;  /* Saf siyah kart */
            --text-color: #ffffff;
            --accent-color: #0a84ff;
            --secondary-text: #8e8e93;
            --neon-blue: #0071e3;
            --neon-purple: #bf00ff;
        }

        * {
            -webkit-font-smoothing: antialiased;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'SF Pro Text', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 3. EKSTRA KALIN NEON ÇUBUK ANİMASYONU */
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .glow-wrapper {
            position: relative;
            width: 90%;
            max-width: 480px;
            padding: 12px; /* İpi 12px yaptık, artık çok kalın! */
            border-radius: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.5);
            /* Dışa vuran asıl Neon Işığı */
            box-shadow: 0 0 50px rgba(191, 0, 255, 0.4), 
                        0 0 20px rgba(0, 113, 227, 0.3);
        }

        /* Dönen Mavi-Mor Enerji Çubuğu */
        .glow-wrapper::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            /* Genişletilmiş renk geçişi */
            background: conic-gradient(
                from 0deg,
                transparent 0%,
                transparent 30%,
                var(--neon-blue) 40%, 
                var(--neon-purple) 60%, 
                transparent 70%,
                transparent 100%
            );
            animation: rotate 2.5s linear infinite; /* Biraz daha hızlı ve enerjik */
        }

        /* İç Parlama Efekti */
        .glow-wrapper::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 50px;
            /* İçeriye doğru neon yansıması */
            box-shadow: inset 0 0 30px rgba(191, 0, 255, 0.6);
            pointer-events: none;
            z-index: 1;
        }

        .glow-wrapper:hover {
            transform: scale(1.02);
            transition: 0.5s;
        }

        /* Ana İçerik Kutusu */
        .container {
            width: 100%;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 40px;
            position: relative;
            z-index: 2;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* 4. İÇERİK STİLLERİ */
        h1 {
            font-family: 'SF Pro Display', sans-serif;
            font-weight: 700;
            font-size: 34px;
            letter-spacing: -0.04em;
            margin-bottom: 5px;
        }

        .role {
            font-size: 18px;
            color: var(--secondary-text);
            margin-bottom: 30px;
        }

        .section {
            text-align: left;
            margin-bottom: 25px;
            border-top: 1px solid #2c2c2e;
            padding-top: 20px;
        }

        h2 {
            font-size: 13px;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .cv-title { font-size: 16px; font-weight: 600; }
        .cv-desc { font-size: 14px; color: var(--secondary-text); line-height: 1.4; }

        /* 5. BUTON */
        .btn {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #ffffff;
            color: #000000;
            text-decoration: none;
            padding: 18px;
            border-radius: 20px;
            margin-top: 30px;
            font-weight: 700;
            transition: 0.3s;
        }

        .btn:hover {
            background: #e5e5e7;
            transform: translateY(-3px);
        }

        .btn-sub { font-size: 11px; opacity: 0.6; font-weight: 400; margin-top: 2px; }

    </style>
</head>
<body>

<div class="glow-wrapper">
    <div class="container">
        <h1>Hamza Durmuş</h1>
        <div class="role">baya yakışıklıdır kendisi</div>
        
        <div class="section">
            <h2>Eğitim</h2>
            <div class="cv-item">
                <div class="cv-title">Ortaokul (hala okuyorum)</div>
                <div class="cv-desc">15 Temmuz Şehitleri İHO, Bahçelievler, İstanbul</div>
            </div>
        </div>

        <div class="section">
            <h2>Özgeçmiş</h2>
            <div class="cv-item">
                <div class="cv-title">Kendi hakkımda</div>
                <div class="cv-desc">13 yaşındayım ya CV falan daha yok bende</div>
            </div>
        </div>

        <div class="section">
            <h2>İlgi Alanları</h2>
            <div class="cv-desc">ALLAH ATATÜRK FENERBAHÇE</div>
        </div>

        <a href="mailto:hamzadurmuss1@outlook.com" class="btn">
            <span>İletişime Geç</span>
            <span class="btn-sub">güzel kızlar yazsın 😉</span>
        </a>
    </div>
</div>

</body>
</html>
