<style>
    :root {
        --bg-color: #000000; /* Apple'ın gerçek siyahı */
        --card-bg: #1c1c1e;
        --text-color: #ffffff;
        --accent-color: #0a84ff;
        --secondary-text: #8e8e93;
    }
    
    body {
        /* Apple sistem font hiyerarşisi */
        font-family: "-apple-system", "BlinkMacSystemFont", "SF Pro Text", "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        -webkit-font-smoothing: antialiased; /* Fontları pürüzsüzleştirir */
    }
    
    h1 {
        /* Büyük yazılar için Display ağırlığı */
        font-family: "-apple-system", "BlinkMacSystemFont", "SF Pro Display", sans-serif;
        font-weight: 600;
        font-size: 32px;
        letter-spacing: -0.022em; /* Apple'ın spesifik harf aralığı */
    }
    
    p, .skill-tag, footer {
        /* Küçük yazılar için Text ağırlığı */
        font-family: "-apple-system", "BlinkMacSystemFont", "SF Pro Text", sans-serif;
        font-size: 16px;
        letter-spacing: -0.011em;
    }
</style>
