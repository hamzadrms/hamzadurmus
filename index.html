<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamza Durmuş</title>
    <style>
        /* 1. Fontları Sisteme Tanıtıyoruz */
@font-face {
    font-family: 'SF Pro Display';
    src: url('SFProDisplay-Bold.ttf') format('truetype');
    font-weight: 700;
}

@font-face {
    font-family: 'SF Pro Text';
    src: url('SFProText-Regular.ttf') format('truetype');
    font-weight: 400;
}

/* 2. Global Yazı Motoru Ayarları (Anti-Aliasing) */
* {
    -webkit-font-smoothing: antialiased; /* macOS stili pürüzsüzlük */
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility; /* Okunabilirliği optimize et */
}

body {
    font-family: 'SF Pro Text', -apple-system, BlinkMacSystemFont, sans-serif;
    background-color: var(--bg-color);
    color: var(--text-color);
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

h1 {
    font-family: 'SF Pro Display', sans-serif;
    font-weight: 700;
    letter-spacing: -0.04em; /* Apple'ın Display fontu için özel daraltması */
}
        :root {
            --bg-color: #000000;
            --card-bg: #1c1c1e;
            --text-color: #ffffff;
            --accent-color: #0a84ff;
            --secondary-text: #8e8e93;
        }

        body {
            font-family: "-apple-system", "BlinkMacSystemFont", "SF Pro Text", "SF Pro Display", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 90%;
            max-width: 480px;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 32px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h1 {
            font-family: "-apple-system", "SF Pro Display", sans-serif;
            font-weight: 700;
            font-size: 34px;
            letter-spacing: -0.04em;
            margin: 0 0 5px 0;
        }

        .role {
            font-size: 18px;
            color: var(--secondary-text);
            margin-bottom: 30px;
            font-weight: 400;
        }

        .section {
            text-align: left;
            margin-bottom: 25px;
            border-top: 0.5px solid #38383a;
            padding-top: 20px;
        }

        h2 {
            font-size: 13px;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .cv-item {
            margin-bottom: 15px;
        }

        .cv-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .cv-desc {
            font-size: 14px;
            color: var(--secondary-text);
            line-height: 1.4;
        }

        .btn {
            display: block;
            background: var(--text-color);
            color: var(--bg-color);
            text-decoration: none;
            padding: 14px;
            border-radius: 14px;
            font-weight: 600;
            margin-top: 30px;
            text-align: center;
            transition: transform 0.2s;
        }

        .btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Hamza Durmuş</h1>
    <div class="role">baya yakışıklıdır kendisi</div>
    
    <div class="section">
        <h2>Eğitim</h2>
        <div class="cv-item">
            <div class="cv-title">Ortaokul (hala okuyorum)</div>
            <div class="cv-desc">15 Temmuz Şehitleri İHO, Bahçelievler, İstanbul</div>
        </div>
    </div>

    <div class="section">
        <h2>Özgeçmiş</h2>
        <div class="cv-item">
            <div class="cv-title">Kendi hakkımda</div>
            <div class="cv-desc">13 yaşındayım ya CV falan daha yok bende</div>
    </div>

    <div class="section">
        <h2>İlgi Alanları</h2>
        <div class="cv-desc">ALLAH ATATÜRK FENERBAHÇE</div>
    </div>

    <a href="mailto:hamzadurmuss1@outlook.com" class="btn">
    <span style="display: block; font-size: 16px; font-weight: 600;">İletişime Geç</span>
    <span style="display: block; font-size: 11px; font-weight: 400; opacity: 0.7; margin-top: 4px;">
        güzel kızlar yazsın 😉
    </span>
</a>
</div>

</body>
</html>
